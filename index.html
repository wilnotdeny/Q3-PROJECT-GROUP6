<!DOCTYPE html>
<html>
<head>
    <title>Philippine Destination Key - Project</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
             background-image: url(chuchu.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            font-family: Arial, sans-serif;
            text-align: center;

        }


        .container {
            background-color: white;
            opacity: .9;
            width: 40%;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            border: 5px solid rgb(97, 24, 24);
            border-radius: 20px;
            border-style: double;
           
        }


        .navbar {
            margin-bottom: 20px;
        }


        footer {
            margin-top: 50px;
            color: #ffffff;
        }


        h1 {
            color: rgb(187, 83, 83);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }


        .result-box {
            font-size: 25px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(155, 73, 73);
            margin-top: 20px;
        }


        label{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(187, 83, 83);
        }
    </style>
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PDK</a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Fare Matrix</a></li>
                <li class="nav-item"><a class="nav-link" href="registration.html">Registration</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Fare Converter</h1>
        <p>Select your stations below:</p>

        <label>Pick-up Station:</label><br>
        <select id="pickup" class="form-control mb-3">
            <option value="North Avenue">North Avenue</option>
            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
        </select>

        <label>Drop-off Station:</label><br>
        <select id="dropoff" class="form-control mb-3">
            <option value="North Avenue">North Avenue</option>
            <option value="Quezon Avenue">Quezon Avenue</option>
            <option value="Kamuning">Kamuning</option>
            <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
            <option value="Ortigas">Ortigas</option>
            <option value="Ayala">Ayala</option>
            <option value="Taft Avenue">Taft Avenue</option>
        </select>

        <label>Are you a Senior/Student?</label><br>
        <select id="discount" class="form-control mb-3">
            <option value="no">No</option>
            <option value="yes">Yes (20% Discount)</option>
        </select>

        <button onclick="computeFare()" class="btn btn-primary">CLICK TO COMPUTE</button>

        <div id="result" class="result-box">
            Fare: 0₱
        </div>
    </div>

    <footer>
        <p>Chu Tan, Manuntag, Sibug | Grade 9 - Emerald</p>
    </footer>

    <script>
        var basefare = 50; 
        var perKMrate = 15; 
        var baseKM = 2; 

        function computeFare() {
            var pickup = document.getElementById("pickup").value;
            var dropoff = document.getElementById("dropoff").value;
            var discount = document.getElementById("discount").value;
            var distance = 0;

            if (pickup == dropoff) {
                distance = 0;
            }
            else if (pickup == "North Avenue" && dropoff == "Quezon Avenue") {
                distance = 1;
            }
            else if (pickup == "North Avenue" && dropoff == "Kamuning") {
                distance = 2;
            }
            else if (pickup == "North Avenue" && dropoff == "Araneta Center-Cubao") {
                distance = 3;
            }
            else if (pickup == "North Avenue" && dropoff == "Ortigas") {
                distance = 5;
            }
            else if (pickup == "North Avenue" && dropoff == "Ayala") {
                distance = 10;
            }
            else if (pickup == "North Avenue" && dropoff == "Taft Avenue") {
                distance = 12;
            }
            else if (pickup == "Araneta Center-Cubao" && dropoff == "Ortigas") {
                distance = 2;
            }
            else if (pickup == "Araneta Center-Cubao" && dropoff == "Ayala") {
                distance = 7;
            }
            else if (pickup == "Araneta Center-Cubao" && dropoff == "Taft Avenue") {
                distance = 9;
            }
            else {
                distance = 5; 
            }

            var fare = basefare;

            if (distance > baseKM) {
                var extraDistance = distance - baseKM;
                var extraCharge = extraDistance * perKMrate;
                fare = basefare + extraCharge;
            }

            if (discount == "yes") {
                fare = fare * 0.80;
            }

            var Finalfare = Math.round(fare);

            document.getElementById("result").innerHTML = "Fare: " + Finalfare + "₱";
        }
    </script>
</body>
</html>
